name: DeepSeek Code Review v1.0

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    name: Review code changes with DeepSeek
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files diff
        id: diff
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff "origin/${{ github.base_ref }}...HEAD" -- . > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"
          MAX_SIZE=100000
          if [ "$(wc -c < /tmp/pr_diff.txt)" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
          fi

      - name: Build and send review request
        id: review
        shell: python3 {0}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          import json, os, urllib.request

          with open("/tmp/pr_diff.txt") as f:
              diff_content = f.read()

          # Build messages
          system_msg = "You are a senior software engineer reviewing a pull request. Be thorough, constructive, and concise."

          user_msg = (
              "Review the following pull request diff. Provide your analysis in this structure:\n"
              "\n"
              "Summary:\n"
              "- Brief overview of the changes\n"
              "\n"
              "Code Quality and Best Practices:\n"
              "- Issues found (if any)\n"
              "\n"
              "Potential Bugs and Security Concerns:\n"
              "- Issues found (if any)\n"
              "\n"
              "Suggestions for Improvement:\n"
              "- Suggestions (if any)\n"
              "\n"
              "Overall Verdict:\n"
              "- Approve or Request Changes\n"
              "\n"
              "Here is the diff:\n"
              f"{diff_content}"
          )

          payload = json.dumps({
              "model": "deepseek-chat",
              "messages": [
                  {"role": "system", "content": system_msg},
                  {"role": "user", "content": user_msg}
              ],
              "max_tokens": 4096,
              "temperature": 0.2
          })

          req = urllib.request.Request(
              "https://api.deepseek.com/chat/completions",
              data=payload.encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['DEEPSEEK_API_KEY']}"
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  response_json = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print(f"API call failed with status {e.code}")
              print(e.read().decode("utf-8"))
              exit(1)

          review_text = response_json["choices"][0]["message"]["content"]
          with open("/tmp/review_output.txt", "w") as f:
              f.write(review_text)

          # Write output for GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("review_done=true\n")

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review_output.txt';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review output file found. Skipping comment.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewPath, 'utf8');
            const { data: comment } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Code Review\n\n${reviewBody}\n\n---\n*Powered by DeepSeek API*`
            });

            console.log(`Review posted as comment #${comment.id}`);