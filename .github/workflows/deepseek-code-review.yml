name: DeepSeek Code Review v1.0

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    name: Review code changes with DeepSeek
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files diff
        id: diff
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff "origin/${{ github.base_ref }}...HEAD" -- . > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"
          MAX_SIZE=100000
          if [ "$(wc -c < /tmp/pr_diff.txt)" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
          fi

      - name: Call DeepSeek API to review code
        id: review
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr_diff.txt)

          # Build the system prompt
          SYSTEM_MSG='You are a senior software engineer reviewing a pull request. Be thorough, constructive, and concise.'

          # Build the user message with review instructions and the diff
          USER_MSG=$(cat <<ENDMSG
        Review the following pull request diff. Provide your analysis in this structure:

        Summary:
        - Brief overview of the changes

        Code Quality and Best Practices:
        - Issues found (if any)

        Potential Bugs and Security Concerns:
        - Issues found (if any)

        Suggestions for Improvement:
        - Suggestions (if any)

        Overall Verdict:
        - Approve or Request Changes

        Here is the diff:

        ${DIFF_CONTENT}
        ENDMSG
        )

          # Escape for JSON
          SYSTEM_ESCAPED=$(printf '%s' "$SYSTEM_MSG" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          USER_ESCAPED=$(printf '%s' "$USER_MSG" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          PAYLOAD=$(cat <<EOF
        {
          "model": "deepseek-chat",
          "messages": [
            {"role": "system", "content": ${SYSTEM_ESCAPED}},
            {"role": "user", "content": ${USER_ESCAPED}}
          ],
          "max_tokens": 4096,
          "temperature": 0.2
        }
        EOF
        )

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -d "$PAYLOAD" \
            "https://api.deepseek.com/chat/completions")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "API call failed with status $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          REVIEW_TEXT=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          echo "$REVIEW_TEXT" > /tmp/review_output.txt

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review_output.txt';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review output file found. Skipping comment.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewPath, 'utf8');
            const { data: comment } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Code Review\n\n${reviewBody}\n\n---\n*Powered by DeepSeek API*`
            });

            console.log(`Review posted as comment #${comment.id}`);