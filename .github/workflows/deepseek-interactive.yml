name: DeepSeek Interactive Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepseek-interactive:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    name: Respond to /review command in PR comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Get PR diff
        id: diff
        run: |
          PR_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")

          BASE_REF=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['base']['ref'])")

          git fetch origin "$BASE_REF" --depth=1

          git diff "origin/${BASE_REF}...HEAD" -- . > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"

          MAX_SIZE=100000
          if [ "$(wc -c < /tmp/pr_diff.txt)" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Call DeepSeek API with user instructions
        id: review
        shell: python3
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          import json, os, urllib.request

          with open("/tmp/pr_diff.txt") as f:
              diff_content = f.read()

          comment_body = os.environ["COMMENT_BODY"]
          comment_user = os.environ["COMMENT_USER"]

          # Strip the /review command prefix to get user instructions
          user_instructions = comment_body.replace("/review", "", 1).strip()

          if not user_instructions:
              user_instructions = "Please review the overall PR."

          system_msg = "You are a senior software engineer reviewing a pull request. Be thorough, constructive, and concise."

          user_msg = (
              f"Here is the diff of a Pull Request:\n\n"
              f"{diff_content}\n\n"
              f"User @{comment_user} gave the following instructions for this review:\n"
              f"{user_instructions}\n\n"
              "Provide your review covering code quality, potential bugs, security concerns, and suggestions. "
              "Format your response with clear sections."
          )

          payload = json.dumps({
              "model": "deepseek-chat",
              "messages": [
                  {"role": "system", "content": system_msg},
                  {"role": "user", "content": user_msg}
              ],
              "max_tokens": 4096,
              "temperature": 0.2
          })

          req = urllib.request.Request(
              "https://api.deepseek.com/chat/completions",
              data=payload.encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['DEEPSEEK_API_KEY']}"
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  response_json = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              print(f"API call failed with status {e.code}")
              print(e.read().decode("utf-8"))
              exit(1)

          review_text = response_json["choices"][0]["message"]["content"]
          with open("/tmp/review_output.txt", "w") as f:
              f.write(review_text)

      - name: Post DeepSeek response as comment reply
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review_output.txt';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review output file found. Skipping.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewPath, 'utf8');
            const commentUser = '${{ github.event.comment.user.login }}';
            const triggerComment = '${{ github.event.comment.body }}';

            const { data: reply } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Response to @${commentUser}\n\n${reviewBody}\n\n---\n*Triggered by comment: *`,
            });

            console.log(`Reply posted as comment #${reply.id}`);