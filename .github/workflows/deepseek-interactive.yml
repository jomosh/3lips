name: DeepSeek Interactive Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepseek-interactive:
    if: |
      github.event.issue.pull_request
      && startsWith(github.event.comment.body, '/review')
      && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    name: Respond to /review command in PR comments

    steps:
      - name: Validate comment has meaningful instructions
        id: validate
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          INSTRUCTIONS=$(echo "$COMMENT_BODY" | sed 's|^/review||' | xargs)

          if [ -z "$INSTRUCTIONS" ]; then
            echo "instructions=Review the overall PR." >> "$GITHUB_OUTPUT"
          else
            echo "instructions=$INSTRUCTIONS" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Get PR diff
        id: diff
        run: |
          PR_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")

          BASE_REF=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['base']['ref'])")

          git fetch origin "$BASE_REF" --depth=1

          git diff "origin/${BASE_REF}...HEAD" -- . > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"

          # Truncate if too large (100KB)
          MAX_SIZE=100000
          if [ "$(wc -c < /tmp/pr_diff.txt)" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Diff was larger than 100KB and was truncated."
          fi

      - name: Call DeepSeek API with user instructions
        id: review
        shell: python3 {0}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ vars.DEEPSEEK_API_URL || 'https://api.deepseek.com/chat/completions' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          DEEPSEEK_MAX_TOKENS: ${{ vars.DEEPSEEK_MAX_TOKENS || '4096' }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          USER_INSTRUCTIONS: ${{ steps.validate.outputs.instructions }}
        run: |
          import sys, os
          sys.path.insert(0, ".github/scripts")
          from deepseek_review import load_diff, call_deepseek, write_review_output

          diff_content = load_diff()
          comment_user = os.environ["COMMENT_USER"]
          user_instructions = os.environ["USER_INSTRUCTIONS"]

          system_msg = (
              "You are a senior software engineer reviewing a pull request. "
              "Be thorough, constructive, and concise."
          )

          user_msg = (
              f"Here is the diff of a Pull Request:\n\n"
              f"{diff_content}\n\n"
              f"User @{comment_user} gave the following instructions for this review:\n"
              f"{user_instructions}\n\n"
              "Provide your review covering code quality, potential bugs, "
              "security concerns, and suggestions. "
              "Format your response with clear sections."
          )

          review_text = call_deepseek(system_msg, user_msg)
          write_review_output(review_text)

      - name: Post DeepSeek response as comment reply
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review_output.txt';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review output file found. Skipping.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewPath, 'utf8');
            const commentUser = '${{ github.event.comment.user.login }}';

            const { data: reply } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Response to @${commentUser}\n\n${reviewBody}\n\n---\n*Powered by DeepSeek API*`,
            });

            console.log(`Reply posted as comment #${reply.id}`);