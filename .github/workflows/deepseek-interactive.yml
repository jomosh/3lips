name: DeepSeek Interactive Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deepseek-interactive:
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    name: Respond to /review command in PR comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Extract comment and PR info
        id: info
        run: |
          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          echo '${{ github.event.comment.body }}' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          echo "comment_user=${{ github.event.comment.user.login }}" >> "$GITHUB_OUTPUT"

      - name: Get PR diff
        id: diff
        run: |
          # Get the base ref of the PR
          PR_JSON=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")

          BASE_REF=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['base']['ref'])")

          git fetch origin "$BASE_REF" --depth=1

          # Get diff against base
          git diff "origin/${BASE_REF}...HEAD" -- . > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"

          # Truncate if too large (100KB)
          MAX_SIZE=100000
          if [ "$(wc -c < /tmp/pr_diff.txt)" -gt "$MAX_SIZE" ]; then
            head -c "$MAX_SIZE" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Call DeepSeek API with user instructions
        id: review
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr_diff.txt)
          COMMENT_BODY='${{ github.event.comment.body }}'
          COMMENT_USER='${{ github.event.comment.user.login }}'

          # Strip the /review command prefix to get user instructions
          USER_INSTRUCTIONS=$(echo "$COMMENT_BODY" | sed 's|^/review||' | xargs)

          if [ -z "$USER_INSTRUCTIONS" ]; then
            USER_INSTRUCTIONS="Please review the overall PR."
          fi

          PAYLOAD=$(cat <<EOF
          {
            "model": "deepseek-chat",
            "messages": [
              {
                "role": "system",
                "content": "You are a senior software engineer reviewing a pull request. Be thorough, constructive, and concise."
              },
              {
                "role": "user",
                "content": "Here is the diff of a Pull Request:\n\n${DIFF_CONTENT}\n\nUser @${COMMENT_USER} gave the following instructions for this review:\n${USER_INSTRUCTIONS}\n\nProvide your review covering code quality, potential bugs, security concerns, and suggestions. Format your response with clear sections."
              }
            ],
            "max_tokens": 4096,
            "temperature": 0.2
          }
EOF
)

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -d "$PAYLOAD" \
            "https://api.deepseek.com/chat/completions")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "API call failed with status $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          REVIEW_TEXT=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          echo "$REVIEW_TEXT" > /tmp/review_output.txt

      - name: Post DeepSeek response as comment reply
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = '/tmp/review_output.txt';

            if (!fs.existsSync(reviewPath)) {
              console.log('No review output file found. Skipping.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewPath, 'utf8');
            const commentUser = '${{ github.event.comment.user.login }}';
            const triggerComment = '${{ github.event.comment.body }}';

            const { data: reply } = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 DeepSeek Response to @${commentUser}\n\n${reviewBody}\n\n---\n*Triggered by comment: \`${triggerComment}\`*`
            });

            console.log(`Reply posted as comment #${reply.id}`);